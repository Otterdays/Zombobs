<head>

    <meta name="theme-color" content="#ff1744">
    <meta name="color-scheme" content="dark">
    <meta name="format-detection" content="telephone=no">

    <meta property="og:title" content="ZOMBOBS - Zombie Apocalypse with Friends">
    <meta property="og:description" content="Top-down zombie survival shooter. Solo, co-op, and multiplayer.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="ZOMBOBS - Zombie Apocalypse with Friends">
    <meta name="twitter:description" content="Top-down zombie survival shooter. Solo, co-op, and multiplayer.">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/favicon.png">
    <link rel="preload" href="assets/fonts/L0xuDF4xlVMF-BfR8bXMIhJHg45mwgGEFl0_3vqPQw.ttf" as="font"
        type="font/ttf" crossorigin>
    <link rel="stylesheet" href="css/fonts.css">
    <!-- Relative paths for robust Itch.io and CDN path resolution -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui-overlay.css">
    <script>
        // Suppress console warnings from Itch.io iframe Permissions Policy
        (function () {
            const originalWarn = console.warn;
            console.warn = function (...args) {
                const message = args.join(' ');
                // Suppress Permissions Policy warnings from Itch.io iframe
                if (message.includes('Unrecognized feature') ||
                    message.includes('monetization') ||
                    message.includes('xr-spatial-tracking') ||
                    message.includes('Permissions-Policy') ||
                    message.includes('allowfullscreen') ||
                    message.includes('downloadable font:')) {
                    return; // Silently ignore
                }
                originalWarn.apply(console, args);
            };
        })();
    </script>
</head>

<body>
    <div id="boot-overlay" class="boot-overlay" role="status" aria-live="polite" aria-busy="true">
        <div class="boot-overlay__inner">
            <span class="boot-overlay__spinner" aria-hidden="true"></span>
            <span class="boot-overlay__label">Loading</span>
        </div>
    </div>
    <noscript>
        <div class="noscript-notice">
            ZOMBOBS needs JavaScript. Enable scripts in your browser to play.
        </div>
    </noscript>
    <div id="gameContainer">
        <canvas id="gpuCanvas"></canvas>
        <canvas id="gameCanvas"></canvas>
    </div>
    <canvas id="uiCanvas"></canvas>

    <!-- Vendored: avoids itch.io iframe CSP blocking third-party script CDNs -->
    <script src="js/vendor/socket.io.min.js"></script>
    <!-- Use clean relative path for module entry point without crossorigin -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
