<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags for SEO and atmosphere -->
    <meta name="description" content="ZOMBOBS - Zombie Apocalypse with Friends - Top-down survival shooter">
    <meta name="theme-color" content="#ff1744">
    <title>ZOMBOBS - ZOMBIE APOCALYPSE WITH FRIENDS</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="stylesheet" href="css/fonts.css">
    <!-- Relative paths for robust Itch.io and CDN path resolution -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui-overlay.css">
    <script>
        // Suppress console warnings from Itch.io iframe Permissions Policy
        (function () {
            const originalWarn = console.warn;
            console.warn = function (...args) {
                const message = args.join(' ');
                // Suppress Permissions Policy warnings from Itch.io iframe
                if (message.includes('Unrecognized feature') ||
                    message.includes('monetization') ||
                    message.includes('xr-spatial-tracking') ||
                    message.includes('xr') ||
                    message.includes('allowfullscreen') ||
                    message.includes('allow') ||
                    message.includes('Permissions-Policy')) {
                    return; // Silently ignore
                }
                originalWarn.apply(console, args);
            };
        })();
    </script>
</head>

<body>
    <div id="gameContainer">
        <canvas id="gpuCanvas"></canvas>
        <canvas id="gameCanvas"></canvas>
    </div>
    <canvas id="uiCanvas"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- Use clean relative path for module entry point without crossorigin -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
